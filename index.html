<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="top">
            <div class="logo">VANTAGE</div>
            <div class="btns">
                <div class="btn">私たちについて</div>
                <div class="btn">サービス</div>
                <div class="btn">インサイト</div>
                <button class="none">お問い合わせ</button>
            </div>   
        </div>
    </header>
    <main>
        <img class="mainimg" src="/assets/images/photo-1497366216548-37526070297c.avif" alt="">
        
        <div class="content">
            <div class="cir">New:2024年 戦略レポート</div>
            <h1>デジタルの未来を、<br> 加速させる。</h1>
            <p>VANTAGEは、戦略、デザイン、テクノロジーを融合させ、ビジネスの成長を牽引するデジタル体験を創造するグローバルエージェンシーです。</p>
            <div class="btns">
                <button class="serch">詳しく見る</button>
                <button class="mission" onclick="Open()">ミッション</button>
            </div>
        </div>
        <div class="mission-content">
            <div class="mission-text">
                <button class="close" onclick="Close()">閉じる</button>
            </div>
        </div>

        <div class="dev1">
            <div class="left">
                <div class="blue">私たちについて</div>
                <h2>想像と現実の<br>架け橋になる。</h2>
                <div>2015年の設立以来、Vantageは200以上の野心的なブランドと提携し人々に愛されるプロダクトを構築してきました。優れたデザインとは、見た目の美しさだけでなく、機能性にあると信じています。</div>
                <div class="number">
                    <div>
                        <div class="blue big">10+</div>
                        年の経験
                    </div>
                    <div>
                        <div class="blue big">200+</div>
                        プロジェクト
                    </div>
                    <div>
                        <div class="blue big">50+</div>
                        受賞歴
                    </div>
                </div>
            </div>
            <div class="right">
                <img src="/assets/images/photo-1522071820081-009f0129c71c.avif" alt="">
            </div>
        </div>
        <div class="move-content">
            <div class="text">革新的な企業からの信頼</div>
            <div class="belt">

                <div class="move">
                    <img src="/assets/images/acme-corp.svg" alt="">
                    <img src="/assets/images/cyberdyne.svg" alt="">
                    <img src="/assets/images/globex.svg" alt="">
                    <img src="/assets/images/initech.svg" alt="">
                    <img src="/assets/images/soylent.svg" alt="">
                    <img src="/assets/images/stark.svg" alt="">
                    <img src="/assets/images/umbrella.svg" alt="">
                    <img src="/assets/images/wayne.svg" alt="">
                </div>
                <div class="move clone">
                    <img src="/assets/images/acme-corp.svg" alt="">
                    <img src="/assets/images/cyberdyne.svg" alt="">
                    <img src="/assets/images/globex.svg" alt="">
                    <img src="/assets/images/initech.svg" alt="">
                    <img src="/assets/images/soylent.svg" alt="">
                    <img src="/assets/images/stark.svg" alt="">
                    <img src="/assets/images/umbrella.svg" alt="">
                    <img src="/assets/images/wayne.svg" alt="">
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
</body>
<script src="script.js"></script>
</html>
